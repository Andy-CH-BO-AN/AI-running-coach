name: tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ai_running_coach_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_running_coach_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ai_running_coach_test
        run: alembic upgrade head

      - name: Run core tests
        run: ./scripts/test_core.sh

      - name: Run DB tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ai_running_coach_test
        run: python -m pytest -q tests/test_db_importer.py tests/test_db_repositories.py
