<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="AI 跑步教練訓練狀態 Dashboard，每日訓練決策、負荷監控與體能趨勢分析">
    <title>AI 跑步教練 Dashboard</title>
    <link rel="stylesheet" href="/dashboard/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">AI Running Coach</p>
          <h1>訓練狀態 Dashboard</h1>
        </div>
        <div class="report-tools">
          <label class="select-label" for="reportSelect">報告</label>
          <select id="reportSelect" class="report-select"></select>
          <button id="reloadButton" class="icon-button" type="button" aria-label="重新整理報告" title="重新整理報告">↻</button>
        </div>
      </header>

      <main>
        <div id="appStatus" class="app-status" role="status">正在載入報告...</div>

        <!-- Primary Action Bar: 今天做什麼 -->
        <div id="primaryAction"></div>

        <section id="statusGrid" class="status-grid" aria-label="目前狀態"></section>

        <!-- Zone A: 本週教練判斷 + 7-Day Load + Race Readiness -->
        <section class="section-grid two-col" aria-label="本週訓練決策">
          <article class="panel decision-panel light-surface">
            <div class="section-heading">
              <div>
                <p class="eyebrow">今天 · 本週</p>
                <h2>教練判斷</h2>
              </div>
            </div>
            <div id="coachSummary"></div>
          </article>

          <aside class="side-stack">
            <article class="panel load-panel">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">近 7 天</p>
                  <h2>訓練負荷</h2>
                </div>
              </div>
              <div id="loadAssessment"></div>
            </article>
            <article class="panel">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">賽事準備度</p>
                  <h2>目標賽事</h2>
                </div>
              </div>
              <div id="raceReadiness"></div>
            </article>
          </aside>
        </section>

        <!-- Zone B: 最近一次重點訓練回顧 -->
        <section class="panel" aria-label="最近訓練回顧">
          <div class="section-heading">
            <div>
              <p class="eyebrow">最近一次重點訓練</p>
              <h2>訓練回顧</h2>
            </div>
          </div>
          <div id="latestActivity"></div>
        </section>

        <!-- Zone C: 4-Week Load + Narratives -->
        <section class="panel" aria-label="近4週訓練趨勢">
          <div class="section-heading">
            <div>
              <p class="eyebrow">近 4 週</p>
              <h2>跑量與訓練負荷</h2>
            </div>
            <span class="subtle">四週表格</span>
          </div>
          <div class="training-layout">
            <div id="weeklyChart" class="chart-box"></div>
            <div id="weeklyNarratives" class="week-stack"></div>
          </div>
          <div id="crossTrainingHighlights" class="cross-training-grid"></div>
        </section>

        <!-- Zone C2: 12-Week Fitness Trend -->
        <section class="panel" aria-label="近12週體能趨勢">
          <div class="section-heading">
            <div>
              <p class="eyebrow">近 12 週</p>
              <h2>長期體能趨勢</h2>
            </div>
          </div>
          <div id="twelveWeekContent"></div>
        </section>

        <!-- Zone D: Next Week Plan -->
        <section class="panel" aria-label="下週訓練計畫">
          <div class="section-heading">
            <div>
              <h2>訓練計畫</h2>
            </div>
          </div>
          <div id="planSummary" class="plan-summary-bar"></div>
          <p id="planAdjustment" class="plan-adjustment-banner hidden"></p>
          <div id="periodizationOverview" class="periodization-overview"></div>
          <div id="weeklyCalendar" class="calendar-grid"></div>
        </section>

        <!-- Zone E: Secondary Details -->
        <section class="panel secondary-details-panel" aria-label="詳細指標">
          <div class="section-heading">
            <div>
              <h2>詳細指標</h2>
            </div>
          </div>
          <div class="secondary-details-grid">
            <section class="intensity-detail-section">
              <div class="section-heading compact">
                <div>
                  <p class="eyebrow">強度分佈</p>
                </div>
              </div>
              <div id="intensityZones"></div>
            </section>

            <article class="metric-detail-card">
              <div class="section-heading compact">
                <div>
                  <p class="eyebrow">生理能力</p>
                  <h3>配速與體能指標</h3>
                </div>
              </div>
              <div id="physioMetrics"></div>
            </article>

            <article class="metric-detail-card">
              <div class="section-heading compact">
                <div>
                  <p class="eyebrow">跑步經濟性</p>
                  <h3>跑姿與經濟性</h3>
                </div>
              </div>
              <div id="runningMechanics"></div>
            </article>
          </div>
        </section>

        <!-- Zone F: Evidence Layer (collapsed by default) -->
        <section class="panel" aria-label="AI建議依據">
          <div class="section-heading">
            <div>
              <p class="eyebrow">建議理由</p>
              <h2>教練判斷依據</h2>
            </div>
            <span class="subtle" style="font-size:13px">可展開</span>
          </div>
          <div id="evidenceLayer"></div>
        </section>
      </main>
    </div>

    <script src="/dashboard/reportAdapter.js"></script>
    <script src="/dashboard/app.js"></script>
  </body>
</html>
